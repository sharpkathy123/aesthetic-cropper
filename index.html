<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Aesthetic Choice</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/smartcrop/2.0.5/smartcrop.js"></script>
    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom); }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            text-align: center; background: #000; color: #fff; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            touch-action: none; /* Prevents browser bounce while dragging */
        }
        #mainCanvasContainer {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: #111; padding: 10px; overflow: hidden; position: relative;
        }
        #mainDisplay { max-width: 100%; max-height: 100%; border-radius: 8px; }
        .suggestion-rail {
            height: 160px; display: flex; overflow-x: auto; align-items: flex-start;
            gap: 15px; padding: 20px; background: #1c1c1e; border-top: 1px solid #333;
            -webkit-overflow-scrolling: touch; padding-bottom: var(--safe-bottom);
        }
        .crop-card { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; }
        .crop-card canvas { 
            height: 90px; width: auto; border-radius: 8px; 
            border: 3px solid transparent; background: #000; transition: all 0.2s;
        }
        .crop-card.selected canvas { border-color: #007AFF; transform: scale(1.03); }
        .crop-card span { font-size: 10px; font-weight: 700; margin-top: 8px; color: #8e8e93; text-transform: uppercase; }
        .controls { 
            padding: 15px 10px; background: #000; display: flex; justify-content: center; gap: 6px; flex-wrap: wrap;
        }
        .btn { 
            background: #fff; color: #000; padding: 10px 14px; 
            border-radius: 20px; font-weight: 700; cursor: pointer; font-size: 12px;
            text-decoration: none; border: none; white-space: nowrap;
        }
        .btn-save { background: #34C759; color: #fff; display: none; }
        .btn-adjust { background: #FF9500; color: #fff; display: none; }
        .btn-adjust.active { background: #007AFF; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div id="mainCanvasContainer">
        <canvas id="mainDisplay"></canvas>
    </div>

    <div class="controls">
        <label for="upload" class="btn">PICK PHOTO</label>
        <input type="file" id="upload" accept="image/*">
        <button id="adjustBtn" class="btn btn-adjust">DRAG TO ADJUST</button>
        <a id="saveBtn" class="btn btn-save">SAVE CROP</a>
    </div>

    <div class="suggestion-rail" id="rail">
        <div style="width: 100%; color: #444; font-size: 13px; text-align: center; padding-top: 30px;">
            Upload to start
        </div>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const mainCanvas = document.getElementById('mainDisplay');
        const saveBtn = document.getElementById('saveBtn');
        const adjustBtn = document.getElementById('adjustBtn');
        const rail = document.getElementById('rail');
        const mCtx = mainCanvas.getContext('2d');
        
        let currentImg = null;
        let currentCrop = null;
        let isAdjusting = false;
        let isDragging = false;
        let startX, startY;

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    currentImg = img;
                    isAdjusting = false;
                    adjustBtn.classList.remove('active');
                    processImage(img);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        adjustBtn.addEventListener('click', () => {
            isAdjusting = !isAdjusting;
            adjustBtn.classList.toggle('active');
            adjustBtn.innerText = isAdjusting ? "LOCK POSITION" : "DRAG TO ADJUST";
            renderMainDisplay();
        });

        // Touch handling for dragging
        mainCanvas.addEventListener('touchstart', (e) => {
            if (!isAdjusting || !currentCrop) return;
            const touch = e.touches[0];
            const rect = mainCanvas.getBoundingClientRect();
            const scaleX = mainCanvas.width / rect.width;
            const scaleY = mainCanvas.height / rect.height;
            startX = (touch.clientX - rect.left) * scaleX;
            startY = (touch.clientY - rect.top) * scaleY;
            
            // Only drag if touching inside the crop box
            if (startX >= currentCrop.x && startX <= currentCrop.x + currentCrop.width &&
                startY >= currentCrop.y && startY <= currentCrop.y + currentCrop.height) {
                isDragging = true;
            }
        });

        mainCanvas.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const touch = e.touches[0];
            const rect = mainCanvas.getBoundingClientRect();
            const scaleX = mainCanvas.width / rect.width;
            const scaleY = mainCanvas.height / rect.height;
            const curX = (touch.clientX - rect.left) * scaleX;
            const curY = (touch.clientY - rect.top) * scaleY;
            
            const dx = curX - startX;
            const dy = curY - startY;

            // Update crop coordinates within bounds
            currentCrop.x = Math.max(0, Math.min(mainCanvas.width - currentCrop.width, currentCrop.x + dx));
            currentCrop.y = Math.max(0, Math.min(mainCanvas.height - currentCrop.height, currentCrop.y + dy));
            
            startX = curX;
            startY = curY;
            renderMainDisplay();
            updateSaveLink();
        });

        mainCanvas.addEventListener('touchend', () => isDragging = false);

        async function processImage(img) {
            rail.innerHTML = '';
            saveBtn.style.display = 'none';
            adjustBtn.style.display = 'none';
            const options = [
                { name: "Square", w: 1, h: 1 },
                { name: "Portrait", w: 4, h: 5 },
                { name: "Classic", w: 3, h: 2 },
                { name: "Story", w: 9, h: 16 },
                { name: "Cinema", w: 2.39, h: 1 }
            ];

            mainCanvas.width = img.width;
            mainCanvas.height = img.height;
            mCtx.drawImage(img, 0, 0);

            for (let opt of options) {
                const result = await smartcrop.crop(img, { width: opt.w * 100, height: opt.h * 100 });
                createCropCard(img, result.topCrop, opt.name);
            }
        }

        function renderMainDisplay() {
            if (!currentImg || !currentCrop) return;
            mCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
            mCtx.drawImage(currentImg, 0, 0);

            // Draw Dark Overlay
            mCtx.fillStyle = "rgba(0, 0, 0, 0.6)";
            mCtx.fillRect(0, 0, mainCanvas.width, currentCrop.y); // Top
            mCtx.fillRect(0, currentCrop.y + currentCrop.height, mainCanvas.width, mainCanvas.height - (currentCrop.y + currentCrop.height)); // Bottom
            mCtx.fillRect(0, currentCrop.y, currentCrop.x, currentCrop.height); // Left
            mCtx.fillRect(currentCrop.x + currentCrop.width, currentCrop.y, mainCanvas.width - (currentCrop.x + currentCrop.width), currentCrop.height); // Right

            // Highlight border
            mCtx.strokeStyle = isAdjusting ? '#FF9500' : '#007AFF';
            mCtx.lineWidth = Math.max(currentImg.width, currentImg.height) * 0.006;
            mCtx.strokeRect(currentCrop.x, currentCrop.y, currentCrop.width, currentCrop.height);
            
            drawGrid(currentCrop);
        }

        function updateSaveLink() {
            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = currentCrop.width; finalCanvas.height = currentCrop.height;
            finalCanvas.getContext('2d').drawImage(currentImg, currentCrop.x, currentCrop.y, currentCrop.width, currentCrop.height, 0, 0, currentCrop.width, currentCrop.height);
            saveBtn.href = finalCanvas.toDataURL("image/jpeg", 0.9);
        }

        function createCropCard(img, crop, label) {
            const card = document.createElement('div');
            card.className = 'crop-card';
            const thumb = document.createElement('canvas');
            thumb.width = crop.width; thumb.height = crop.height;
            thumb.getContext('2d').drawImage(img, crop.x, crop.y, crop.width, crop.height, 0, 0, crop.width, crop.height);
            card.innerHTML = `<span>${label}</span>`;
            card.prepend(thumb);
            
            card.onclick = () => {
                currentCrop = Object.assign({}, crop); // Copy so we don't overwrite original
                renderMainDisplay();
                updateSaveLink();
                saveBtn.style.display = 'inline-block';
                adjustBtn.style.display = 'inline-block';
                document.querySelectorAll('.crop-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
            };
            rail.appendChild(card);
        }

        function drawGrid(crop) {
            mCtx.setLineDash([15, 15]);
            mCtx.strokeStyle = 'rgba(255,255,255,0.4)';
            mCtx.lineWidth = Math.max(crop.width, crop.height) * 0.003;
            for(let i=1; i<=2; i++) {
                mCtx.beginPath();
                mCtx.moveTo(crop.x + (crop.width/3)*i, crop.y);
                mCtx.lineTo(crop.x + (crop.width/3)*i, crop.y + crop.height);
                mCtx.stroke();
                mCtx.beginPath();
                mCtx.moveTo(crop.x, crop.y + (crop.height/3)*i);
                mCtx.lineTo(crop.x + crop.width, crop.y + (crop.height/3)*i);
                mCtx.stroke();
            }
        }
    </script>
</body>
</html>
