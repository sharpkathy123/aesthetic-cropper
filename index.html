<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aesthetic Crop</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/smartcrop/2.0.5/smartcrop.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #000; color: #fff; padding: 20px; }
        #container { position: relative; display: inline-block; margin-top: 20px; max-width: 100%; }
        canvas { max-width: 100%; border-radius: 12px; }
        .controls { margin-top: 30px; }
        input[type="file"] { display: none; }
        .btn { background: #007AFF; color: white; padding: 15px 30px; border-radius: 25px; font-weight: bold; text-decoration: none; display: inline-block; cursor: pointer; }
        p { color: #888; font-size: 14px; }
    </style>
</head>
<body>

    <h2>Aesthetic Cropper</h2>
    <p>AI suggests the best framing for your photo.</p>

    <div id="container">
        <canvas id="displayCanvas"></canvas>
    </div>

    <div class="controls">
        <label for="upload" class="btn">Choose Photo</label>
        <input type="file" id="upload" accept="image/*">
    </div>

    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('displayCanvas');
        const ctx = canvas.getContext('2d');

        upload.addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    // 1. Draw original image to canvas
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);

                    // 2. Run SmartCrop
                    smartcrop.crop(img, { width: 100, height: 100 }).then(result => {
                        const crop = result.topCrop;
                        
                        // 3. Draw the "Suggested" box
                        ctx.strokeStyle = '#007AFF';
                        ctx.lineWidth = Math.max(img.width, img.height) * 0.01;
                        ctx.strokeRect(crop.x, crop.y, crop.width, crop.height);
                        
                        // 4. Add a Rule of Thirds grid inside the crop
                        drawGrid(crop);
                    });
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        function drawGrid(crop) {
            ctx.setLineDash([15, 15]);
            ctx.lineWidth = ctx.lineWidth / 2;
            // Vertical lines
            for(let i=1; i<=2; i++) {
                ctx.beginPath();
                ctx.moveTo(crop.x + (crop.width/3)*i, crop.y);
                ctx.lineTo(crop.x + (crop.width/3)*i, crop.y + crop.height);
                ctx.stroke();
            }
            // Horizontal lines
            for(let i=1; i<=2; i++) {
                ctx.beginPath();
                ctx.moveTo(crop.x, crop.y + (crop.height/3)*i);
                ctx.lineTo(crop.x + crop.width, crop.y + (crop.height/3)*i);
                ctx.stroke();
            }
        }
    </script>
</body>
</html>
