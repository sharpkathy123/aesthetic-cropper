<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Aesthetic Choice</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/smartcrop/2.0.5/smartcrop.js"></script>
    <style>
        :root {
            --safe-bottom: env(safe-area-inset-bottom);
        }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            text-align: center; 
            background: #000; 
            color: #fff; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        #mainCanvasContainer {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            padding: 10px;
            overflow: hidden;
        }
        #mainDisplay { 
            max-width: 100%; 
            max-height: 100%; 
            border-radius: 8px;
        }
        .suggestion-rail {
            height: 220px;
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 20px;
            background: #1c1c1e;
            border-top: 1px solid #333;
            -webkit-overflow-scrolling: touch;
            padding-bottom: calc(20px + var(--safe-bottom));
        }
        .crop-card {
            flex: 0 0 140px;
            background: #2c2c2e;
            border-radius: 14px;
            padding: 6px;
            border: 3px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .crop-card.selected { border-color: #007AFF; }
        .crop-card canvas { 
            width: 100%; 
            border-radius: 10px; 
            aspect-ratio: 1/1; 
            object-fit: contain;
            background: #000;
        }
        .crop-card span { 
            font-size: 13px; 
            font-weight: 600; 
            margin-top: 8px; 
            color: #8e8e93;
        }
        .crop-card.selected span { color: #007AFF; }
        
        .controls { 
            padding: 15px; 
            background: #000;
        }
        .btn { 
            background: #007AFF; color: #fff; padding: 14px 28px; 
            border-radius: 24px; font-weight: 600; display: inline-block; cursor: pointer;
            font-size: 17px;
        }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div id="mainCanvasContainer">
        <canvas id="mainDisplay"></canvas>
    </div>

    <div class="controls">
        <label for="upload" class="btn">Choose Photo</label>
        <input type="file" id="upload" accept="image/*">
    </div>

    <div class="suggestion-rail" id="rail">
        <div style="width: 100%; color: #666; padding-top: 60px;">Upload a photo to see crops...</div>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const mainCanvas = document.getElementById('mainDisplay');
        const rail = document.getElementById('rail');
        const mCtx = mainCanvas.getContext('2d');
        let currentImg = null;

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    currentImg = img;
                    processImage(img);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        async function processImage(img) {
            rail.innerHTML = ''; 
            
            // Define varied aesthetic goals
            const options = [
                { name: "Square", w: 1, h: 1 },
                { name: "Portrait", w: 4, h: 5 },
                { name: "Story", w: 9, h: 16 },
                { name: "Cinematic", w: 2.35, h: 1 }
            ];

            // Setup main display
            mainCanvas.width = img.width;
            mainCanvas.height = img.height;
            mCtx.drawImage(img, 0, 0);

            for (let opt of options) {
                // Requesting the crop from SmartCrop.js
                const result = await smartcrop.crop(img, { width: opt.w * 100, height: opt.h * 100 });
                createCropCard(img, result.topCrop, opt.name);
            }
        }

        function createCropCard(img, crop, label) {
            const card = document.createElement('div');
            card.className = 'crop-card';
            
            const thumb = document.createElement('canvas');
            // We set the thumbnail canvas to the size of the crop itself
            thumb.width = crop.width;
            thumb.height = crop.height;
            const tCtx = thumb.getContext('2d');
            
            // Draw ONLY the cropped portion into the thumbnail
            tCtx.drawImage(img, crop.x, crop.y, crop.width, crop.height, 0, 0, crop.width, crop.height);
            
            card.innerHTML = `<span>${label}</span>`;
            card.prepend(thumb);
            
            card.onclick = () => {
                // Clear and redraw original to main display
                mCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
                mCtx.drawImage(img, 0, 0);
                
                // Draw aesthetic guide (The blue box)
                mCtx.strokeStyle = '#007AFF';
                mCtx.lineWidth = Math.max(img.width, img.height) * 0.008;
                mCtx.strokeRect(crop.x, crop.y, crop.width, crop.height);
                
                // Draw Rule of Thirds Grid
                drawGrid(crop);
                
                // Update selection UI
                document.querySelectorAll('.crop-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
            };
            
            rail.appendChild(card);
        }

        function drawGrid(crop) {
            mCtx.setLineDash([20, 20]);
            mCtx.strokeStyle = 'rgba(255,255,255,0.6)';
            mCtx.lineWidth = Math.max(crop.width, crop.height) * 0.004;
            
            for(let i=1; i<=2; i++) {
                // Verticals
                mCtx.beginPath();
                mCtx.moveTo(crop.x + (crop.width/3)*i, crop.y);
                mCtx.lineTo(crop.x + (crop.width/3)*i, crop.y + crop.height);
                mCtx.stroke();
                // Horizontals
                mCtx.beginPath();
                mCtx.moveTo(crop.x, crop.y + (crop.height/3)*i);
                mCtx.lineTo(crop.x + crop.width, crop.y + (crop.height/3)*i);
                mCtx.stroke();
            }
        }
    </script>
</body>
</html>
