<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Aesthetic Choice</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/smartcrop/2.0.5/smartcrop.js"></script>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            text-align: center; 
            background: #000; 
            color: #fff; 
            margin: 0; 
            padding-bottom: 50px;
        }
        #mainDisplay { 
            width: 100%; 
            max-height: 50vh; 
            object-fit: contain; 
            background: #1a1a1a;
        }
        .suggestion-rail {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }
        .crop-card {
            flex: 0 0 150px;
            background: #222;
            border-radius: 10px;
            padding: 10px;
            border: 2px solid transparent;
        }
        .crop-card.selected { border-color: #007AFF; }
        .crop-card canvas { width: 100%; border-radius: 5px; margin-bottom: 8px; }
        .controls { padding: 20px; }
        .btn { 
            background: #007AFF; color: #fff; padding: 15px 30px; 
            border-radius: 25px; font-weight: bold; display: inline-block; cursor: pointer;
        }
        input[type="file"] { display: none; }
        h3 { margin: 20px 0 0 0; font-size: 1.2rem; }
    </style>
</head>
<body>

    <canvas id="mainDisplay"></canvas>

    <div class="controls">
        <label for="upload" class="btn">Pick Photo</label>
        <input type="file" id="upload" accept="image/*">
    </div>

    <h3>Aesthetic Options</h3>
    <div class="suggestion-rail" id="rail">
        </div>

    <script>
        const upload = document.getElementById('upload');
        const mainCanvas = document.getElementById('mainDisplay');
        const rail = document.getElementById('rail');
        const mCtx = mainCanvas.getContext('2d');

        upload.addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    processImage(img);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        async function processImage(img) {
            rail.innerHTML = ''; // Clear old ones
            
            // We'll ask for 3 different types of crops
            const options = [
                { name: "Balanced", width: 1, height: 1 },
                { name: "Wide", width: 16, height: 9 },
                { name: "Portrait", width: 4, height: 5 }
            ];

            // Display original on main canvas
            mainCanvas.width = img.width;
            mainCanvas.height = img.height;
            mCtx.drawImage(img, 0, 0);

            for (let opt of options) {
                const result = await smartcrop.crop(img, { width: opt.width, height: opt.height });
                createCropCard(img, result.topCrop, opt.name);
            }
        }

        function createCropCard(img, crop, label) {
            const card = document.createElement('div');
            card.className = 'crop-card';
            
            const thumb = document.createElement('canvas');
            thumb.width = crop.width;
            thumb.height = crop.height;
            const tCtx = thumb.getContext('2d');
            tCtx.drawImage(img, crop.x, crop.y, crop.width, crop.height, 0, 0, crop.width, crop.height);
            
            card.innerHTML = `<span>${label}</span>`;
            card.prepend(thumb);
            
            card.onclick = () => {
                // When clicked, show high-res crop on main display
                mCtx.drawImage(img, 0, 0);
                mCtx.strokeStyle = '#007AFF';
                mCtx.lineWidth = Math.max(img.width, img.height) * 0.01;
                mCtx.strokeRect(crop.x, crop.y, crop.width, crop.height);
                
                document.querySelectorAll('.crop-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
            };
            
            rail.appendChild(card);
        }
    </script>
</body>
</html>
